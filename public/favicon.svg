    <path d="M144 220l140-62c12-5 24 4 24 16v164c0 12-12 21-24 16l-140-62z" fill="#ffffff" />
    
    <!-- Soundwaves radiating outward -->
    <path d="M356 210c14 18 14 54 0 72" stroke="#ffffff" stroke-width="22" stroke-linecap="round" fill="none" />
    <path d="M394 180c26 32 26 92 0 124" stroke="#ffffff" stroke-width="22" stroke-linecap="round" fill="none" opacity="0.75" />
    <path d="M432 150c38 48 38 132 0 180" stroke="#ffffff" stroke-width="22" stroke-linecap="round" fill="none" opacity="0.5" />
